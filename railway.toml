[build]
builder = "nixpacks"
buildCommand = "pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu"

[deploy]
startCommand = "uvicorn src.api_server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
